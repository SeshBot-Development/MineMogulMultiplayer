name: Publish to Nexus Mods

on:
  release:
    types: [published]

jobs:
  publish-nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle ZIP from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the ZIP asset from the release (MineMogulMultiplayer-v*.zip)
          ASSET_URL=$(gh api repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets \
            --jq '.[] | select(.name | test("\\.zip$")) | .url')

          if [ -z "$ASSET_URL" ]; then
            echo "::error::No ZIP file found in release assets"
            exit 1
          fi

          ASSET_NAME=$(gh api repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets \
            --jq '.[] | select(.name | test("\\.zip$")) | .name')

          gh api "$ASSET_URL" -H "Accept: application/octet-stream" > "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV
          echo "Downloaded: $ASSET_NAME"

      - name: Extract version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ vars.NEXUS_FILE_GROUP_ID }}
          filename: ${{ env.ASSET_NAME }}
          version: ${{ env.VERSION }}
          display_name: "MineMogul Multiplayer v${{ env.VERSION }}"
          description: "${{ github.event.release.body }}"
          file_category: main
